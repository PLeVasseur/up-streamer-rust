name: Native Frame CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/**"
      - "**/Cargo.*"
      - "**/src/**"
      - "**/tests/**"
      - "**/examples/**"
      - "utils/**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  native-frame-checks:
    runs-on: ubuntu-22.04
    env:
      OPENSSL_NO_VENDOR: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install native transport build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libboost-all-dev libclang-dev pkg-config libssl-dev

      - name: Format
        run: cargo fmt --check

      - name: Check
        shell: bash
        run: |
          source build/envsetup.sh highest
          cargo check --workspace --all-targets --all-features

      - name: Test
        shell: bash
        run: |
          source build/envsetup.sh highest
          cargo test --workspace --all-targets --all-features

      - name: Clippy
        shell: bash
        run: |
          source build/envsetup.sh highest
          cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Docs
        shell: bash
        run: |
          source build/envsetup.sh highest
          RUSTDOCFLAGS=-Dwarnings cargo doc -p up-streamer --no-deps --all-features
